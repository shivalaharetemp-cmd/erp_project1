{% extends 'base.html' %}
{% block title %}Change Password - ERP{% endblock %}
{% block page_title %}Change Password{% endblock %}
{% block content %}
<div class="form-section" style="max-width:500px;">
    <form method="post">
        {% csrf_token %}
        <div class="form-group"><label>{{ form.old_password.label }}</label>{{ form.old_password }}</div>
        <div class="form-group"><label>{{ form.new_password.label }}</label>{{ form.new_password }}</div>
        <div class="form-group"><label>{{ form.confirm_password.label }}</label>{{ form.confirm_password }}</div>
        <div class="btn-group">
            <button type="submit" class="btn btn-primary">Update Password</button>
            <a href="{% url 'dashboard' %}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
